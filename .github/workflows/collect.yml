name: Collect Munpia rankings

on:
  schedule:
    - cron: '10 0 * * *' # 매일 09:10 KST
  workflow_dispatch:
  push:
    paths:
      - '.automation/run-collect.txt'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Collect rankings
        run: npm run collect
      - name: Validate data and analytics
        run: npm test
      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/rankings.json; then
            echo "No ranking changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rankings.json
          git commit -m "data: collect daily Munpia rankings"
          git push
