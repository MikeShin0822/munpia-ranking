name: Collect Munpia rankings

on:
  schedule:
    - cron: '10 22 * * *' # 매일 07:10 KST
  workflow_dispatch:
  push:
    paths:
      - '.automation/run-collect.txt'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Collect rankings
        run: npm run collect
      - name: Generate daily report
        run: node scripts/report.mjs
      - name: Validate data and analytics
        run: npm test
      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/rankings.json data/latest-report.json; then
            echo "No ranking changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/rankings.json data/latest-report.json
            git commit -m "data: collect daily Munpia rankings"
            git push
          fi
      - name: Verify published dashboard and live data
        shell: bash
        run: |
          set -u
          expected_date=$(TZ=Asia/Seoul date +%F)
          site='https://mikeshin0822.github.io/munpia-ranking/'
          data='https://raw.githubusercontent.com/MikeShin0822/munpia-ranking/main/data/rankings.json'
          for attempt in {1..6}; do
            site_code=$(curl -L -sS -o site.html -w '%{http_code}' "$site" || true)
            data_code=$(curl -L -sS -o live-rankings.json -w '%{http_code}' "$data" || true)
            echo "attempt=$attempt site_status=$site_code data_status=$data_code expected_date=$expected_date"
            if [ "$site_code" = '200' ] && [ "$data_code" = '200' ] \
              && grep -q '문피아 제목 레이더' site.html \
              && grep -q "\"date\":\"$expected_date\"" live-rankings.json; then
              echo 'Published dashboard and current data verified.'
              exit 0
            fi
            sleep 10
          done
          echo 'Published dashboard verification failed.'
          exit 1
