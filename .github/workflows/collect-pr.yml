name: Collect Munpia snapshot artifact

on:
  pull_request:
    branches: [main]
    paths:
      - '.automation/pr-trigger/**'

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Collect rankings
        id: collect
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run collect 2>&1 | tee collect.log
      - name: Validate data and analytics
        if: always()
        continue-on-error: true
        shell: bash
        run: npm test 2>&1 | tee test.log
      - name: Upload ranking snapshot and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rankings-json
          path: |
            data/rankings.json
            collect.log
            test.log
          if-no-files-found: error
