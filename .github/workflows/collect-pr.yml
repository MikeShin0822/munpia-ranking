name: Collect Munpia snapshot artifact

on:
  pull_request:
    branches: [main]
    paths:
      - '.automation/pr-trigger/**'

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Collect rankings
        run: npm run collect
      - name: Validate data and analytics
        run: npm test
      - name: Upload ranking snapshot
        uses: actions/upload-artifact@v4
        with:
          name: rankings-json
          path: data/rankings.json
          if-no-files-found: error
