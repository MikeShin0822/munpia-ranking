name: Collect Munpia snapshot artifact

on:
  pull_request:
    branches: [main]
    paths:
      - '.automation/pr-trigger/**'

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Capture Munpia page markup
        continue-on-error: true
        shell: bash
        run: |
          curl -L -sS --max-time 30 \
            -A 'Mozilla/5.0 (compatible; MunpiaTitleArchive/1.0)' \
            -H 'accept-language: ko-KR,ko;q=0.9' \
            'https://mm.munpia.com/?action=list&menu=best&section=today' \
            -o free-page1.html
          grep -Eo 'href=["'"'][^"'"']+["'"']' free-page1.html > hrefs.txt || true
      - name: Collect rankings
        id: collect
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run collect 2>&1 | tee collect.log
      - name: Validate data and analytics
        if: always()
        continue-on-error: true
        shell: bash
        run: npm test 2>&1 | tee test.log
      - name: Upload ranking snapshot and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rankings-json
          path: |
            data/rankings.json
            collect.log
            test.log
            free-page1.html
            hrefs.txt
          if-no-files-found: error
