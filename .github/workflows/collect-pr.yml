name: Collect Munpia snapshot artifact

on:
  pull_request:
    branches: [main]
    paths:
      - '.automation/pr-trigger/**'

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Capture Munpia AJAX responses
        continue-on-error: true
        shell: bash
        run: |
          set -u
          sections=(today plsa.eachtoday plsa.exclusive-eachtoday prefer plsa.bestseller)
          for section in "${sections[@]}"; do
            safe=${section//./_}
            curl -L -sS --max-time 30 \
              -A 'Mozilla/5.0 (compatible; MunpiaTitleArchive/1.0)' \
              -H 'accept-language: ko-KR,ko;q=0.9' \
              "https://mm.munpia.com/?ajx=1&menu=best&action=list&section=${section}&keyword=&page=1" \
              -o "ajax-${safe}-1.json" || true
            sleep 2
          done
      - name: Collect rankings
        id: collect
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run collect 2>&1 | tee collect.log
      - name: Validate data and analytics
        if: always()
        continue-on-error: true
        shell: bash
        run: npm test 2>&1 | tee test.log
      - name: Upload ranking snapshot and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rankings-json
          path: |
            data/rankings.json
            collect.log
            test.log
            ajax-*.json
          if-no-files-found: error
